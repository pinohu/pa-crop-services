# PA CROP Services — Full Power Tool Stack
# Run: docker compose up -d
# 
# Services:
#   Paperless-ngx  → http://localhost:8000 (document management + OCR)
#   Uptime Kuma    → http://localhost:3001 (monitoring)
#   Stirling PDF   → http://localhost:8080 (PDF toolkit)
#
# Plausible and Cal.com are cloud-hosted (simpler) — see POWER-TOOLS.md

version: "3.8"

services:
  # ============================================================
  # PAPERLESS-NGX — Document Management + OCR
  # ============================================================
  paperless-redis:
    image: redis:7
    container_name: crop-paperless-redis
    restart: unless-stopped
    volumes:
      - paperless-redis-data:/data

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: crop-paperless
    restart: unless-stopped
    depends_on:
      - paperless-redis
    ports:
      - "8000:8000"
    volumes:
      - paperless-data:/usr/src/paperless/data
      - paperless-media:/usr/src/paperless/media
      - paperless-export:/usr/src/paperless/export
      - ./paperless/consume:/usr/src/paperless/consume  # Drop scanned files here
    environment:
      PAPERLESS_REDIS: redis://paperless-redis:6379
      PAPERLESS_DBENGINE: sqlite
      PAPERLESS_OCR_LANGUAGE: eng
      PAPERLESS_OCR_MODE: skip_noarchive
      PAPERLESS_CONSUMER_POLLING: 10  # Check for new files every 10 seconds
      PAPERLESS_CONSUMER_RECURSIVE: "true"
      PAPERLESS_CONSUMER_SUBDIRS_AS_TAGS: "true"
      PAPERLESS_FILENAME_FORMAT: "{correspondent}/{created_year}/{title}"
      PAPERLESS_TASK_WORKERS: 2
      PAPERLESS_TIKA_ENABLED: 1
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998
      # Set these on first run:
      # PAPERLESS_ADMIN_USER: admin
      # PAPERLESS_ADMIN_PASSWORD: changeme
      PAPERLESS_URL: http://localhost:8000
      PAPERLESS_TIME_ZONE: America/New_York
      # Enable API for n8n integration
      PAPERLESS_CORS_ALLOWED_HOSTS: "https://pacropservices.com,https://www.pacropservices.com"

  # Tika — extracts text from Office docs (Word, Excel, etc.)
  tika:
    image: ghcr.io/paperless-ngx/tika:latest
    container_name: crop-tika
    restart: unless-stopped

  # Gotenberg — converts Office docs to PDF
  gotenberg:
    image: docker.io/gotenberg/gotenberg:8
    container_name: crop-gotenberg
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"

  # ============================================================
  # UPTIME KUMA — Monitoring
  # ============================================================
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: crop-uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data

  # ============================================================
  # STIRLING PDF — PDF Toolkit
  # ============================================================
  stirling-pdf:
    image: frooodle/s-pdf:latest
    container_name: crop-stirling-pdf
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - stirling-data:/usr/share/stirling-pdf/data
    environment:
      DOCKER_ENABLE_SECURITY: "true"

volumes:
  paperless-redis-data:
  paperless-data:
  paperless-media:
  paperless-export:
  uptime-kuma-data:
  stirling-data:
